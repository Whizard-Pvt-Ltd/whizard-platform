A few design assumptions used while deriving the cases: the hierarchy is governed as Industry → FG → PWO → SWO → Capability + Proficiency → Skill → Task → Control Unit, published industry versions are immutable, company changes are delta-based overrides/extensions, and all evaluative and framework actions are auditable in a multi-tenant SaaS model. Those assumptions come directly from the SRS and align with the provided mockups. 


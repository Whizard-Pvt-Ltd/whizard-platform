version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: whizard-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whizard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whizard-network

  # Core API Service
  core-api:
    build:
      context: .
      dockerfile: apps/api/core-api/Dockerfile
    container_name: whizard-core-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      CORE_API_PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whizard

      # CORS Configuration
      CORS_ORIGIN: http://core-api:3001,http://bff:3000,http://admin-portal:80

      # Stack Auth Configuration
      STACK_AUTH_PROJECT_ID: "a3f5b8a7-22d3-49d5-9f56-76e0489e8d51"
      STACK_AUTH_SECRET_SERVER_KEY: "ssk_r3h4wxtrgpezgbzsvtned8t6mehvj6vew9hq2b49rvv68"
      STACK_AUTH_PUBLISHABLE_CLIENT_KEY: "pck_pd36qj7jeyemw01c5a7k1s1bfvkbm7servsmxrnkav8z8"

      # Stack Auth User Sync Configuration
      STACK_AUTH_DEFAULT_TENANT_TYPE: SYSTEM
      STACK_AUTH_DEFAULT_TENANT_ID: system
      STACK_AUTH_MFA_REQUIRED: "false"

      # Logging
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - whizard-network

  # BFF API Service
  bff:
    build:
      context: .
      dockerfile: apps/api/bff/Dockerfile
    container_name: whizard-bff
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BFF_PORT: 3000
      HOST: 0.0.0.0

      # Core API Connection
      CORE_API_URL: http://core-api:3001

      # CORS Configuration
      CORS_ORIGIN: http://localhost:4200,http://admin-portal:80

      # Logging
      LOG_LEVEL: info
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - whizard-network

  # Admin Portal (Angular)
  admin-portal:
    build:
      context: .
      dockerfile: apps/web/admin-portal/Dockerfile
      args:
        # Build-time environment variables for Angular/Vite
        VITE_BFF_API_URL: http://localhost:3000
        VITE_STACK_AUTH_PROJECT_ID: "a3f5b8a7-22d3-49d5-9f56-76e0489e8d51"
        VITE_STACK_AUTH_PUBLISHABLE_CLIENT_KEY: "pck_pd36qj7jeyemw01c5a7k1s1bfvkbm7servsmxrnkav8z8"
    container_name: whizard-admin-portal
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - bff
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - whizard-network

volumes:
  postgres_data:
    driver: local

networks:
  whizard-network:
    driver: bridge

name: CI

on:
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.6.0

jobs:
  validate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER || 'whizard' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'whizard' }}
          POSTGRES_DB: ${{ secrets.DB_NAME || 'whizard' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://whizard:whizard@localhost:5432/whizard' }}

      - name: Run Prisma migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://whizard:whizard@localhost:5432/whizard' }}

      - name: Lint code
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://whizard:whizard@localhost:5432/whizard' }}
          NODE_ENV: test

      - name: Type check
        run: pnpm build

      - name: Build with NX
        run: pnpm build:all

      - name: PR Summary
        if: always()
        run: |
          echo "### ✅ PR Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks passed successfully!" >> $GITHUB_STEP_SUMMARY

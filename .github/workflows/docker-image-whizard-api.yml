name: Build and Push Docker Images

on:
  push:
    # branches:
    #   - main
    #   - develop
    tags:
      # - 'api-*'
      - 'v*.*.*'

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.6.0
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'lilcom' }}

jobs:
  # First validate the code
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER || 'whizard' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'whizard' }}
          POSTGRES_DB: ${{ secrets.DB_NAME || 'whizard' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://whizard:whizard@localhost:5432/whizard' }}

      - name: Run Prisma migrations
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://whizard:whizard@localhost:5432/whizard' }}

      - name: Lint code
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://whizard:whizard@localhost:5432/whizard' }}
          NODE_ENV: test

      - name: Clean build cache
        run: find . -name "*.tsbuildinfo" -type f -delete && rm -rf .nx/cache

      - name: Build with NX
        run: pnpm build:all --verbose

  # Build and push Docker images
  docker-build-push:
    name: Build & Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bff
            dockerfile: apps/api/bff/Dockerfile
            context: .
            image: whizard-club-bff
          - name: core-api
            dockerfile: apps/api/core-api/Dockerfile
            context: .
            image: whizard-club-api
          - name: admin-portal-dev
            dockerfile: apps/web/admin-portal/Dockerfile
            context: .
            image: whizard-club-web-dev
            build_env: dev
          - name: admin-portal-test
            dockerfile: apps/web/admin-portal/Dockerfile
            context: .
            image: whizard-club-web-test
            build_env: test



    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,format=short,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=22
            PNPM_VERSION=10.6.0
            BUILD_ENV=${{ matrix.build_env }}
            VITE_BFF_API_URL=https://bfftest.whizard.club
            VITE_STACK_AUTH_PROJECT_ID=a3f5b8a7-22d3-49d5-9f56-76e0489e8d51
            VITE_STACK_AUTH_PUBLISHABLE_CLIENT_KEY=pck_emn3m14ezqavtsp7b0bbv91swt0cpkazqy9ax83pfcmp8

      - name: Image Summary
        run: |
          echo "### ✅ ${{ matrix.service.name }} Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.image }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Summary job
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [validate, docker-build-push]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.validate.result }}" == "success" ] && [ "${{ needs.docker-build-push.result }}" == "success" ]; then
            echo "✅ All builds completed successfully!"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🎉 Build & Push Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All Docker images have been built and pushed to Docker Hub!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Images Available:" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ env.DOCKERHUB_USERNAME }}/whizard-bff:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ env.DOCKERHUB_USERNAME }}/whizard-core-api:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ env.DOCKERHUB_USERNAME }}/whizard-admin-portal:latest\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build or push failed"
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some builds failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

@if (open) {
  <div class="backdrop" (click)="closed.emit()"></div>
}

<nav class="drawer" [class.open]="open">
  <div class="drawer-header">
    <span class="drawer-logo">Whizard Admin</span>
    <button class="close-btn" (click)="closed.emit()">✕</button>
  </div>

  <div class="drawer-body">
    <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>

    <div class="nav-section-label">WRCF</div>

    <a class="nav-item" routerLink="/industry-wrcf" routerLinkActive="active" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Manage Industry
    </a>

    <a class="nav-item" routerLink="/wrcf-skills" routerLinkActive="active" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      Manage Skills
    </a>

    <a class="nav-item" routerLink="/wrcf-roles" routerLinkActive="active" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Manage Roles
    </a>

    <div class="nav-section-label">Account</div>

    <a class="nav-item" routerLink="/profile" routerLinkActive="active" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Profile
    </a>
  </div>
</nav>

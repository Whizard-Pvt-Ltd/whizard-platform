<div class="flex flex-col h-full bg-whizard-bg-main font-sans overflow-hidden">
  <!-- Error banner -->
  @if (errorMessage()) {
    <div
      class="flex items-center justify-between px-8 py-3 bg-red-950/50 border-b border-red-800/50 text-sm text-red-300 shrink-0"
    >
      <span>{{ errorMessage() }}</span>
      <button
        type="button"
        (click)="errorMessage.set(null)"
        class="ml-4 text-red-400 hover:text-red-200 transition-colors"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  }

  <!-- Main workspace -->
  @if (mode() === 'list') {
    <div class="flex-1 flex overflow-hidden">
      <whizard-internship-list-panel
        class="flex flex-col shrink-0"
        [internships]="internships()"
        [selectedId]="selectedId()"
        [loading]="loading()"
        (internshipSelected)="onInternshipSelected($event)"
      />

      <whizard-internship-detail-panel
        class="flex-1 overflow-hidden"
        [internship]="selectedInternship()"
        (editClicked)="onEditClicked()"
      />
    </div>
  }

  @if (mode() === 'edit' || mode() === 'create') {
    <mat-sidenav-container class="flex-1">
      <!-- Left drawer: Assessment library panel -->
      <mat-sidenav
        mode="side"
        opened
        disableClose
        class="w-116.5 border-r border-whizard-border bg-whizard-bg-main shadow-[1px_2px_15px_0px_rgba(0,0,0,0.3)] h-[90dvh] overflow-hidden"
      >
        <whizard-assessment-library-panel class="flex flex-col" />
      </mat-sidenav>

      <!-- Main content: Internship form -->
      <mat-sidenav-content
        class="overflow-hidden"
      >
        <whizard-internship-form
          [formValue]="formValue()"
          [cities]="cities()"
          [industryRoles]="industryRoles()"
          [coordinators]="coordinators()"
          [functionalGroups]="functionalGroups()"
          [internshipId]="selectedId()"
          (formChanged)="onFormChanged($event)"
        />
      </mat-sidenav-content>
    </mat-sidenav-container>
  }
</div>

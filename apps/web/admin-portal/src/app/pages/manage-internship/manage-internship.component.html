<div class="flex flex-col h-full bg-wrcf-bg-primary font-sans overflow-hidden">
  <!-- Error banner -->
  @if (errorMessage()) {
    <div
      class="flex items-center justify-between px-8 py-3 bg-red-950/50 border-b border-red-800/50 text-sm text-red-300 shrink-0"
    >
      <span>{{ errorMessage() }}</span>
      <button
        type="button"
        (click)="errorMessage.set(null)"
        class="ml-4 text-red-400 hover:text-red-200 transition-colors"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  }

  <!-- Main workspace -->
  <div class="flex-1 flex overflow-hidden">
    <!-- LIST MODE: internship list (left) + read-only detail panel (right) -->
    @if (mode() === 'list') {
      <whizard-internship-list-panel
        class="flex flex-col"
        style="height: 100dvh"
        whizardScrollbar="true"
        [internships]="internships()"
        [selectedId]="selectedId()"
        [loading]="loading()"
        (internshipSelected)="onInternshipSelected($event)"
      />

      <whizard-internship-detail-panel
        class="flex-1 flex flex-col h-full"
        [internship]="selectedInternship()"
        (editClicked)="onEditClicked()"
      />
    }

    <!-- EDIT / CREATE MODE: assessment library (left) + editable form (right) -->
    @if (mode() === 'edit' || mode() === 'create') {
      <whizard-assessment-library-panel />

      <div class="flex-1 flex flex-col overflow-hidden bg-wrcf-bg-card">
        <whizard-internship-form
          [formValue]="formValue()"
          (formChanged)="onFormChanged($event)"
          class="flex-1 overflow-hidden"
        />
      </div>
    }
  </div>
</div>

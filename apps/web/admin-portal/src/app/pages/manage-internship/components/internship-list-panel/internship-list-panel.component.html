<div class="flex flex-col h-full w-[320px] min-w-[320px] bg-wrcf-bg-card border-r border-wrcf-border overflow-hidden">

  <!-- Search -->
  <div class="px-4 py-3 border-b border-wrcf-border shrink-0">
    <div class="flex items-center gap-2 h-10 px-3 rounded-[10px] bg-wrcf-bg-secondary border border-wrcf-border">
      <mat-icon svgIcon="heroicons_outline:magnifying-glass" class="size-4 text-wrcf-text-secondary shrink-0" />
      <input
        type="text"
        placeholder="Search internships..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        class="flex-1 bg-transparent text-sm text-wrcf-text-primary placeholder:text-wrcf-text-secondary outline-none border-none min-w-0" />
    </div>
  </div>

  <!-- List -->
  <div class="flex-1 overflow-y-auto">
    @if (loading()) {
      @for (i of [1,2,3,4,5]; track i) {
        <div class="flex flex-col gap-2 px-4 py-4 border-b border-wrcf-border/40 animate-pulse">
          <div class="h-24 rounded-lg bg-wrcf-bg-secondary w-full"></div>
          <div class="h-3.5 rounded bg-wrcf-bg-secondary w-3/4"></div>
          <div class="h-2.5 rounded bg-wrcf-bg-secondary w-1/2"></div>
        </div>
      }
    } @else if (filteredInternships().length === 0) {
      <div class="flex flex-col items-center justify-center py-16 gap-2">
        <mat-icon svgIcon="heroicons_outline:briefcase" class="size-12 text-wrcf-text-secondary opacity-40" />
        <span class="text-sm text-wrcf-text-secondary text-center">No internships found</span>
      </div>
    } @else {
      @for (item of filteredInternships(); track item.id) {
        <button
          type="button"
          (click)="select(item.id)"
          class="w-full text-left px-3 py-3 border-b border-wrcf-border/40 transition-colors duration-150 border-l-[4px]"
          [class.bg-wrcf-bg-selected]="selectedId() === item.id"
          [class.border-l-wrcf-accent]="selectedId() === item.id"
          [class.border-l-transparent]="selectedId() !== item.id"
          [class.hover:bg-wrcf-bg-secondary]="selectedId() !== item.id">

          <!-- Banner -->
          @if (item.bannerImageUrl) {
            <img [src]="item.bannerImageUrl" [alt]="item.title"
              class="w-full h-20 rounded-lg object-cover mb-2 shrink-0" />
          } @else {
            <div class="w-full h-20 rounded-lg bg-wrcf-bg-secondary mb-2 flex items-center justify-center shrink-0">
              <mat-icon svgIcon="heroicons_outline:briefcase" class="size-8 text-wrcf-text-secondary opacity-40" />
            </div>
          }

          <div class="flex items-start justify-between gap-2">
            <p class="text-sm font-semibold text-wrcf-text-primary leading-5 flex-1 min-w-0 truncate">{{ item.title }}</p>
            <span class="text-[10px] px-1.5 py-0.5 rounded font-medium shrink-0"
              [class]="statusColors[item.status]">{{ statusLabels[item.status] ?? item.status }}</span>
          </div>

          <div class="mt-1.5 flex flex-wrap gap-x-3 gap-y-0.5 text-[11px] text-wrcf-text-secondary">
            @if (item.cityName) {
              <span class="flex items-center gap-1">
                <mat-icon svgIcon="heroicons_outline:map-pin" class="size-3 shrink-0" />
                {{ item.cityName }}
              </span>
            }
            <span class="flex items-center gap-1">
              <mat-icon svgIcon="heroicons_outline:users" class="size-3 shrink-0" />
              {{ item.vacancies }} Vacanc{{ item.vacancies === 1 ? 'y' : 'ies' }}
            </span>
            <span class="flex items-center gap-1">
              <mat-icon svgIcon="heroicons_outline:clock" class="size-3 shrink-0" />
              {{ item.durationMonths }} Month{{ item.durationMonths === 1 ? '' : 's' }}
            </span>
            @if (item.stipend) {
              <span class="flex items-center gap-1">
                <mat-icon svgIcon="heroicons_outline:currency-rupee" class="size-3 shrink-0" />
                ₹{{ item.stipend | number }}
              </span>
            }
            @if (item.applicationDeadline) {
              <span class="flex items-center gap-1">
                <mat-icon svgIcon="heroicons_outline:calendar" class="size-3 shrink-0" />
                {{ formatDeadline(item.applicationDeadline) }}
              </span>
            }
            <span class="flex items-center gap-1">
              <mat-icon svgIcon="heroicons_outline:computer-desktop" class="size-3 shrink-0" />
              {{ item.internshipType === 'ONSITE' ? 'On-Site' : 'Remote' }}
            </span>
          </div>
        </button>
      }
    }
  </div>
</div>

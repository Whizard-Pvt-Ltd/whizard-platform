<div class="flex flex-col p-6 gap-4">

  <!-- ── Section 1: Final Document Upload ─────────────────────────────── -->
  <div class="flex flex-col gap-5">
    <span class="text-xl font-semibold text-whizard-text-tertiary leading-6.25 tracking-[0.2px]">
      Final Document Upload
    </span>

    <div class="flex flex-col gap-5">
      <!-- Select Document dropdown -->
      <mat-form-field
        appearance="outline"
        class="whizard-outline w-[423px]"
        style="--form-field-bg-color: #0f253f"
      >
        <mat-label>Select Document</mat-label>
        <mat-select
          multiple
          [value]="formValue().finalSubmissionDocuments"
          (selectionChange)="emit({ finalSubmissionDocuments: $event.value })"
        >
          @for (doc of documentOptions; track doc) {
            <mat-option [value]="doc">{{ doc }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <!-- Documents & Guidelines -->
      <div class="flex flex-col gap-2.5">
        <span class="text-lg font-medium text-whizard-text-primary">
          Documents &amp; Guidelines
        </span>
        <whizard-quill-editor
          placeholder="Enter document guidelines..."
          [ngModel]="guidelinesValue()"
          (ngModelChange)="emit({ documentGuidelines: $event || null })"
        />
      </div>
    </div>
  </div>

  <!-- ── Section 2: Add Presentation Rubric ───────────────────────────── -->
  <div class="flex flex-col gap-5">
    <span class="text-xl font-semibold text-whizard-text-tertiary leading-6.25 tracking-[0.2px]">
      Add Presentation Rubric
    </span>

    <div class="flex flex-col gap-5">
      <!-- Drop zone -->
      <label
        class="flex flex-col items-center justify-center w-[199px] h-[126px] rounded-lg bg-whizard-bg-secondary shadow-md cursor-pointer"
        (dragover)="$event.preventDefault()"
        (drop)="onRubricDrop($event)"
      >
        @if (formValue().presentationRubricUrl) {
          <mat-icon class="size-10 text-whizard-accent mb-2">description</mat-icon>
          <span class="text-sm font-medium text-whizard-text-primary tracking-[0.15px]">
            {{ formValue().presentationRubricUrl }}
          </span>
        } @else {
          <mat-icon class="size-10 text-whizard-text-secondary mb-2">cloud_upload</mat-icon>
          <span class="text-sm font-medium text-whizard-text-primary tracking-[0.15px]">
            Drop Rubric Here
          </span>
        }
        <input type="file" accept=".pdf" class="sr-only" (change)="onRubricSelected($event)" />
      </label>

      <!-- Min Scoring + Presentation Weightage -->
      <div class="flex items-center justify-between gap-4">
        <mat-form-field
          appearance="outline"
          class="whizard-outline w-[423px]"
          style="--form-field-bg-color: #0f253f"
        >
          <mat-label>Min. Scoring</mat-label>
          <input
            matInput
            type="number"
            min="0"
            max="100"
            [ngModel]="formValue().minPresentationScore ?? ''"
            (ngModelChange)="emit({ minPresentationScore: $event ? +$event : null })"
          />
        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="whizard-outline w-[423px]"
          style="--form-field-bg-color: #0f253f"
        >
          <mat-label>Presentation Weightage</mat-label>
          <input
            matInput
            type="number"
            min="0"
            max="100"
            [ngModel]="formValue().presentationWeightage ?? ''"
            (ngModelChange)="emit({ presentationWeightage: $event ? +$event : null })"
          />
        </mat-form-field>
      </div>
    </div>
  </div>

  <!-- ── Divider ──────────────────────────────────────────────────────── -->
  <div class="border-t border-whizard-border"></div>

  <!-- ── Section 3: Certificate Template ──────────────────────────────── -->
  <div class="flex items-center justify-between">
    <span class="text-lg font-medium text-whizard-text-primary tracking-[0.15px]">
      Certificate Template
    </span>
    <label>
      <button
        type="button"
        mat-flat-button
        class="!bg-whizard-action !text-white !rounded-lg !h-[35px] !text-sm"
        (click)="certificateInput.click()"
      >
        <mat-icon class="size-5 mr-1">upload</mat-icon>
        Upload
      </button>
      <input
        #certificateInput
        type="file"
        accept=".pdf,.png,.jpg"
        class="sr-only"
        (change)="onCertificateSelected($event)"
      />
    </label>
  </div>

  @if (formValue().certificateTemplateUrl) {
    <span class="text-sm text-whizard-accent">
      {{ formValue().certificateTemplateUrl }}
    </span>
  }

</div>

<div
  class="flex flex-col h-full w-[320px] min-w-[320px] bg-whizard-bg-card border-r border-whizard-border"
>
  <!-- Resource selector -->
  <div class="px-4 py-3 border-b border-whizard-border shrink-0">
    <p
      class="text-[11px] text-whizard-text-secondary mb-1.5 font-medium uppercase tracking-wide"
    >
      Select Resource
    </p>
    <select
      [ngModel]="selectedResource()"
      (ngModelChange)="selectedResource.set($event)"
      class="w-full h-10 px-3 rounded-[10px] bg-whizard-bg-secondary border border-whizard-border text-sm text-whizard-text-primary outline-none appearance-none cursor-pointer"
    >
      @for (opt of resourceOptions; track opt) {
        <option [value]="opt">{{ opt }}</option>
      }
    </select>
  </div>

  <!-- Search -->
  <div class="px-4 py-2.5 border-b border-whizard-border shrink-0">
    <div
      class="flex items-center gap-2 h-9 px-3 rounded-[10px] bg-whizard-bg-secondary border border-whizard-border"
    >
      <mat-icon
        svgIcon="heroicons_outline:magnifying-glass"
        class="size-4 text-whizard-text-secondary shrink-0"
      />
      <input
        type="text"
        placeholder="Search resources..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        class="flex-1 bg-transparent text-sm text-whizard-text-primary placeholder:text-whizard-text-secondary outline-none border-none min-w-0"
      />
    </div>
  </div>

  <!-- Assessment list -->
  <div class="flex-1" whizardScrollbar="true">
    @for (item of filteredAssessments(); track item.id) {
      <div
        class="flex items-center gap-3 px-4 py-3 border-b border-whizard-border/40 hover:bg-whizard-bg-secondary transition-colors cursor-pointer"
      >
        <!-- Thumbnail -->
        <div
          class="w-14 h-14 rounded-lg bg-whizard-action/20 flex items-center justify-center shrink-0 overflow-hidden"
        >
          @if (item.thumbnailUrl) {
            <img
              [src]="item.thumbnailUrl"
              [alt]="item.title"
              class="w-full h-full object-cover"
            />
          } @else {
            <mat-icon
              svgIcon="heroicons_outline:clipboard-document-list"
              class="size-7 text-whizard-accent"
            />
          }
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm text-whizard-text-primary leading-5 line-clamp-2">
            {{ item.title }}
          </p>
          <p class="text-[11px] text-whizard-text-secondary mt-0.5">
            {{ item.category }}
          </p>
        </div>
      </div>
    }
  </div>
</div>

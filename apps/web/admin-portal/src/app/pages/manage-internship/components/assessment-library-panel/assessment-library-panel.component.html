<div class="flex flex-col h-full" [formGroup]="form">

  <!-- Top section: Search + Resource selector -->
  <div class="shrink-0 px-2 pt-1.5 pb-4 flex flex-row  gap-2 items-center">

    <!-- Resource selector (mat-form-field with reactive form) -->
    <mat-form-field appearance="outline" class="whizard-outline w-full" subscriptSizing="dynamic">
      <mat-label>Select Resource</mat-label>
      <mat-select formControlName="resource">
        @for (opt of resourceOptions; track opt) {
          <mat-option [value]="opt">{{ opt }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <!-- Search bar -->
    <mat-form-field appearance="outline" class="whizard-outline w-full" subscriptSizing="dynamic">
      <mat-label>Search for Resources</mat-label>
      <mat-icon matPrefix svgIcon="lucideIcons:search" class="text-whizard-text-secondary" />
      <input matInput type="text" formControlName="search" />
    </mat-form-field>
  </div>

  <!-- Assessment list -->
  <div class="flex-1 overflow-hidden" whizardScrollbar="true" [whizardScrollbarOptions]="{ suppressScrollX: true, wheelPropagation: false }">
    @for (item of filteredAssessments(); track item.id) {
      <div
        class="flex items-start gap-5 justify-center px-4 py-4 border-y border-whizard-border/5 hover:bg-whizard-bg-secondary/50 transition-colors cursor-grab active:cursor-grabbing"
        draggable="true"
        (dragstart)="onDragStart($event, item)"
      >
        <!-- Thumbnail -->
        <div class="w-36.5 h-23 rounded shrink-0 overflow-hidden">
          <img
            [src]="item.thumbnailUrl ?? placeholderImg"
            [alt]="item.title"
            class="w-full h-full object-cover"
          />
        </div>
        <div class="flex flex-col gap-2.5 flex-1 min-w-0">
          <p class="text-lg font-semibold text-whizard-text-primary leading-normal font-whizard-display">
            {{ item.title }}
          </p>
          <p class="text-lg text-whizard-text-secondary leading-5.25 font-whizard-display">
            {{ item.category }}
          </p>
        </div>
      </div>
    }
  </div>
</div>

<mat-tab-group animationDuration="0ms" class="internship-form-tabs h-full">

  <mat-tab label="Details">
    <ng-template matTabContent>
      <whizard-details-tab
        [formValue]="formValue()"
        (formChanged)="formChanged.emit($event)">
      </whizard-details-tab>
    </ng-template>
  </mat-tab>

  <mat-tab label="Screening Criteria">
    <ng-template matTabContent>
      <whizard-screening-criteria-tab
        [formValue]="formValue()"
        (formChanged)="formChanged.emit($event)">
      </whizard-screening-criteria-tab>
    </ng-template>
  </mat-tab>

  <mat-tab label="Selection">
    <ng-template matTabContent>
      <whizard-selection-tab
        [formValue]="formValue()"
        (formChanged)="formChanged.emit($event)">
      </whizard-selection-tab>
    </ng-template>
  </mat-tab>

  <mat-tab label="During Internship">
    <ng-template matTabContent>
      <whizard-during-internship-tab
        [formValue]="formValue()"
        (formChanged)="formChanged.emit($event)">
      </whizard-during-internship-tab>
    </ng-template>
  </mat-tab>

  <mat-tab label="Final Submission">
    <ng-template matTabContent>
      <whizard-final-submission-tab
        [formValue]="formValue()"
        (formChanged)="formChanged.emit($event)">
      </whizard-final-submission-tab>
    </ng-template>
  </mat-tab>

</mat-tab-group>

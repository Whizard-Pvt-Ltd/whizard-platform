<div class="page">
  <header class="page-header">
    <div class="header-left">
      <span class="menu-icon" (click)="drawerOpen.set(true)">☰</span>
      <h1 class="page-title">Dashboard</h1>
    </div>
    <div class="header-right">
      <span class="user-name">{{ userName || 'Admin' }}</span>
      <div class="avatar-wrapper">
        <span class="avatar" (click)="toggleUserMenu()">{{ (userName || 'A').charAt(0).toUpperCase() }}</span>
        @if (userMenuOpen()) {
          <div class="user-menu">
            <a routerLink="/profile" class="user-menu-item" (click)="userMenuOpen.set(false)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
              Profile
            </a>
            <button class="user-menu-item user-menu-logout" (click)="logout()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Logout
            </button>
          </div>
        }
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <h2 class="dashboard-title">Dashboard</h2>
  </main>

  <whizard-nav-drawer [open]="drawerOpen()" (closed)="drawerOpen.set(false)" />
</div>

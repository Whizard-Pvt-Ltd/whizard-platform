<whizard-nav-drawer [open]="drawerOpen()" (closed)="drawerOpen.set(false)" />

<div class="flex flex-col h-screen bg-wrcf-bg-primary font-sans overflow-hidden">

  <!-- Header -->
  <header class="h-16 bg-wrcf-bg-primary px-8 flex items-center justify-between border-b border-wrcf-border shrink-0">
    <div class="flex items-center gap-4">
      <button
        type="button"
        (click)="drawerOpen.set(true)"
        class="flex items-center justify-center w-9 h-9 rounded-lg hover:bg-wrcf-bg-secondary transition-colors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-wrcf-text-primary">
          <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <h1 class="text-2xl font-semibold text-wrcf-text-primary leading-8">Manage Company</h1>
    </div>
    @if (mode() === 'list') {
      <button
        type="button"
        (click)="onAddClicked()"
        class="flex items-center gap-1.5 h-9 px-4 rounded-[10px] bg-wrcf-action text-wrcf-text-primary text-sm font-medium hover:bg-wrcf-action-hover transition-colors shrink-0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add
      </button>
    }
  </header>

  <!-- Full-width filter bar (list mode only) -->
  @if (mode() === 'list') {
    <div class="flex items-center gap-3 px-6 py-2.5 border-b border-wrcf-border bg-wrcf-bg-primary shrink-0">
      <!-- Search -->
      <div class="flex items-center gap-2 h-9 px-3 rounded-[10px] bg-wrcf-bg-secondary border border-wrcf-border min-w-[180px]">
        <mat-icon svgIcon="heroicons_outline:magnifying-glass" class="size-3.5 text-wrcf-text-secondary shrink-0" />
        <input
          type="text"
          placeholder="Search for company..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
          class="w-36 bg-transparent text-sm text-wrcf-text-primary placeholder-wrcf-text-secondary outline-none border-none" />
      </div>

      <!-- Filter chips -->
      <div class="flex items-center gap-1.5 flex-1 overflow-x-auto scrollbar-hide">
        @for (chip of filterChips; track chip) {
          <button
            type="button"
            (click)="activeChip.set(chip)"
            class="px-3 py-1 rounded-full text-xs whitespace-nowrap border transition-colors duration-150 shrink-0"
            [class.bg-wrcf-action]="activeChip() === chip"
            [class.text-wrcf-text-primary]="activeChip() === chip"
            [class.border-wrcf-action]="activeChip() === chip"
            [class.bg-transparent]="activeChip() !== chip"
            [class.text-wrcf-text-secondary]="activeChip() !== chip"
            [class.border-wrcf-border]="activeChip() !== chip">
            {{ chip }}
          </button>
        }
      </div>
    </div>
  }

  <!-- Error banner -->
  @if (errorMessage()) {
    <div class="flex items-center justify-between px-8 py-3 bg-red-950/50 border-b border-red-800/50 text-sm text-red-300 shrink-0">
      <span>{{ errorMessage() }}</span>
      <button type="button" (click)="errorMessage.set(null)" class="ml-4 text-red-400 hover:text-red-200 transition-colors">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  }

  <!-- Main workspace -->
  <div class="flex-1 flex overflow-hidden">

    <!-- VIEW MODE: list + detail -->
    @if (mode() === 'list') {
      <whizard-company-list-panel
        [companies]="filteredCompanies()"
        [selectedId]="selectedCompanyId"
        [loading]="loading()"
        (companySelected)="onCompanySelected($event)" />

      <whizard-company-detail-panel
        [company]="selectedCompany()"
        [clubs]="clubs()"
        [users]="users()"
        (editClicked)="onEditClicked()"
        (previewClicked)="onPreviewClicked()" />
    }

    <!-- EDIT / CREATE MODE: media library + form -->
    @if (mode() === 'edit' || mode() === 'create') {
      <whizard-media-library-panel
        [assets]="mediaAssets()"
        [loading]="mediaLoading()"
        (assetSelected)="onMediaAssetSelected($event)"
        (uploadRequested)="onMediaUploadRequested($event)" />

      <whizard-company-form
        [company]="mode() === 'edit' ? selectedCompany() : null"
        [clubs]="clubs()"
        [industries]="industries()"
        [cities]="cities()"
        [users]="users()"
        [mediaAssets]="mediaAssets()"
        (saved)="onSaved($event)"
        (published)="onPublished($event)"
        (cancelled)="onFormCancelled()"
        (previewClicked)="onPreviewClicked()"
        (mediaUploadRequested)="onMediaUploadRequested($event)" />
    }

    <!-- PREVIEW MODE: full-width preview -->
    @if (mode() === 'preview' && selectedCompany()) {
      <whizard-company-preview
        [company]="selectedCompany()!"
        [clubs]="clubs()"
        [users]="users()"
        (backClicked)="onBackFromPreview()" />
    }

  </div>
</div>

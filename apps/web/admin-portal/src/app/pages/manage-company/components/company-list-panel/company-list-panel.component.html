<div
  class="flex flex-col w-[320px] min-w-[320px] bg-wrcf-bg-card border-r border-wrcf-border overflow-hidden h-full"
>
  <!-- Search header -->
  <div class="px-4 py-3 border-b border-wrcf-border shrink-0">
    <div
      class="flex items-center gap-2 h-10 px-3 rounded-[10px] bg-wrcf-bg-secondary border border-wrcf-border"
    >
      <mat-icon
        svgIcon="heroicons_outline:magnifying-glass"
        class="size-4 text-wrcf-text-secondary shrink-0"
      />
      <input
        type="text"
        placeholder="Search company..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        class="flex-1 bg-transparent text-sm text-wrcf-text-primary placeholder:text-wrcf-text-secondary outline-none border-none min-w-0"
      />
    </div>
  </div>

  <!-- List -->
  <div class="flex-1 relative" whizardScrollbar>
    @if (loading()) {
      @for (i of [1, 2, 3, 4, 5, 6, 8]; track i) {
        <div
          class="flex items-center gap-4 px-4 py-4 border-b border-wrcf-border/40 animate-pulse"
        >
          <div
            class="w-14 h-14 rounded-full bg-wrcf-bg-secondary shrink-0"
          ></div>
          <div class="flex-1 flex flex-col gap-2.5">
            <div class="h-3.5 rounded bg-wrcf-bg-secondary w-3/4"></div>
            <div class="h-2.5 rounded bg-wrcf-bg-secondary w-1/2"></div>
            <div class="h-2.5 rounded bg-wrcf-bg-secondary w-2/3"></div>
          </div>
        </div>
      }
    } @else if (filteredCompanies().length === 0) {
      <div class="flex flex-col items-center justify-center py-16 gap-2">
        <mat-icon
          svgIcon="heroicons_outline:building-office-2"
          class="size-12 text-wrcf-text-secondary opacity-40"
        />
        <span class="text-sm text-wrcf-text-secondary text-center"
          >No companies found</span
        >
      </div>
    } @else {
      @for (company of filteredCompanies(); track company.id) {
        <button
          type="button"
          (click)="selectCompany(company.id)"
          class="w-full text-left px-4 py-4 border-b border-wrcf-border/40 transition-colors duration-150 relative border-l-[4px]"
          [class.bg-wrcf-bg-selected]="selectedId() === company.id"
          [class.border-l-wrcf-accent]="selectedId() === company.id"
          [class.border-l-transparent]="selectedId() !== company.id"
          [class.hover:bg-wrcf-bg-secondary]="selectedId() !== company.id"
        >
          <div class="flex items-start gap-2.5">
            <!-- Logo / initial -->
            @if (company.logoUrl || mockLogoUrl ) {
              <img
                [src]="company.logoUrl ?? mockLogoUrl"
                [alt]="company.name"
                class="w-10 h-10 rounded-full object-cover shrink-0 mt-0.5"
              />
            } @else {
              <div
                class="w-10 h-10 rounded-full bg-wrcf-action flex items-center justify-center text-wrcf-text-primary text-sm font-semibold shrink-0 mt-0.5"
              >
                {{ getInitial(company.name) }}
              </div>
            }

            <div class="flex-1 min-w-0">
              <p
                class="text-sm font-semibold text-wrcf-text-primary truncate leading-6"
              >
                {{ company.name }}
              </p>
              <div
                class="mt-1 flex items-center gap-1 flex-wrap text-sm text-wrcf-text-secondary leading-5"
              >
                @if (company.cityName) {
                  <mat-icon
                    svgIcon="heroicons_outline:map-pin"
                    class="size-4 shrink-0"
                  />
                  <span>{{ company.cityName }}</span>
                }
                @if (company.establishedYear) {
                  <mat-icon
                    svgIcon="heroicons_outline:calendar"
                    class="size-4 shrink-0"
                  />
                  <span>{{ company.establishedYear }}</span>
                }
                @if (company.companyType) {
                  <mat-icon
                    svgIcon="heroicons_outline:building-office-2"
                    class="size-4 shrink-0"
                  />
                  <span>{{ company.companyType }}</span>
                }
              </div>
            </div>
          </div>
        </button>
      }
    }
  </div>
</div>

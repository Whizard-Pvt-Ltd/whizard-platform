<div class="page">
  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label">Industry Sector</label>
      <mat-form-field appearance="outline" class="wrcf-select">
        <mat-select
          [value]="selectedSectorId()"
          (selectionChange)="onSectorChange($event.value)"
        >
          <mat-option value="">Select Sector...</mat-option>
          @for (s of sectors; track s.id) {
            <mat-option [value]="s.id">{{ s.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="filter-group">
      <label class="filter-label">Industry</label>
      <mat-form-field appearance="outline" class="wrcf-select">
        <mat-select
          [value]="selectedIndustryId()"
          (selectionChange)="onIndustryChange($event.value)"
        >
          <mat-option value="">Select Industry...</mat-option>
          @for (i of industries(); track i.id) {
            <mat-option [value]="i.id">{{ i.name }}</mat-option>
          }
          </mat-select>
      </mat-form-field>
    </div>

    <div class="filter-actions">
      <button class="btn-teal">↓ Template</button>
      <button class="btn-teal">↓ Template</button>
      <button class="btn-teal" (click)="onAddSkillsClick()">
        + Add Skills
      </button>
      <button class="btn-teal btn-badge" (click)="mappingDialogOpen.set(true)">
        ⬡ Mappings
        <span class="badge">{{ ciCache().length }}</span>
      </button>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="error-banner">
      <span>⚠ {{ errorMessage() }}</span>
      <button class="error-close" (click)="errorMessage.set('')">✕</button>
    </div>
  }

  @if (toastMessage()) {
    <div class="toast-banner">{{ toastMessage() }}</div>
  }

  <div class="workspace">
    <div class="columns-grid">
      <whizard-wrcf-column
        title="Functional Group"
        [items]="fgList()"
        [selectedId]="selectedFG()?.id ?? null"
        (itemSelected)="onFGSelect($event)"
        (addClicked)="openPanel('create', 'FG')"
        (editClicked)="openPanel('edit', 'FG', $event)"
      />

      <whizard-wrcf-column
        title="Primary Work Obj."
        [items]="pwoList()"
        [selectedId]="selectedPWO()?.id ?? null"
        (itemSelected)="onPWOSelect($event)"
        (addClicked)="selectedFG() ? openPanel('create', 'PWO') : null"
        (editClicked)="openPanel('edit', 'PWO', $event)"
        whizardScrollbar
        style="height: 90vh"
      />

      <whizard-wrcf-column
        title="Secondary Work Obj."
        [items]="swoList()"
        [selectedId]="selectedSWO()?.id ?? null"
        (itemSelected)="onSWOSelect($event)"
        (addClicked)="selectedPWO() ? openPanel('create', 'SWO') : null"
        (editClicked)="openPanel('edit', 'SWO', $event)"
        whizardScrollbar
        style="height: 90vh"
      />

      <whizard-wrcf-column
        title="Capabilities"
        [items]="capabilities"
        [selectedId]="selectedCapabilityId()"
        [readonly]="true"
        (itemSelected)="onCapabilitySelect($event)"
        whizardScrollbar
        style="height: 90vh"
      />

      <whizard-wrcf-column
        title="Proficiency Level"
        [items]="proficiencyLevels"
        [selectedId]="selectedProficiencyId()"
        [readonly]="true"
        [checkboxMode]="profCheckboxMode"
        [checkedIds]="checkedProficiencyIds"
        [savedIds]="savedProficiencyIds"
        (itemSelected)="onProficiencySelect($event)"
        (checkboxToggled)="onProficiencyToggle($event)"
        whizardScrollbar
        style="height: 90vh"
      />
    </div>
  </div>

  @if (panel().open) {
    <div class="panel-backdrop" (click)="closePanel()"></div>
    <whizard-wrcf-panel
      [state]="panel()"
      [panelError]="panelError()"
      (save)="onPanelSave($event)"
      (deleteRequested)="onPanelDeleteRequested()"
      (delete)="onPanelDelete($event)"
      (close)="closePanel()"
    />
  }

  @if (mappingDialogOpen()) {
    <whizard-manage-ci-mappings
      [cache]="ciCache()"
      [sectors]="sectors"
      [initialSectorId]="selectedSectorId()"
      [initialIndustryId]="selectedIndustryId()"
      [initialFgId]="selectedFG()?.id ?? ''"
      (closed)="mappingDialogOpen.set(false)"
      (pendingRemoved)="onPendingCIRemoved($event)"
      (saved)="onCISave($event)"
      (savedDeleted)="onCISavedDeleted($event)"
    />
  }
</div>

<div class="page">
  <header class="page-header">
    <div class="header-left">
      <span class="menu-icon" (click)="drawerOpen.set(true)">☰</span>
      <h1 class="page-title">Manage Industry WRCF</h1>
    </div>
    <div class="header-right">
      <span class="user-name">{{ userName || 'Admin' }}</span>
      <div class="avatar-wrapper">
        <span class="avatar" (click)="toggleUserMenu()">{{ (userName || 'A').charAt(0).toUpperCase() }}</span>
        @if (userMenuOpen()) {
          <div class="user-menu">
            <a routerLink="/profile" class="user-menu-item" (click)="userMenuOpen.set(false)">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              Profile
            </a>
            <button class="user-menu-item user-menu-logout" (click)="logout()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Logout
            </button>
          </div>
        }
      </div>
    </div>
  </header>

  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label">Industry Sector</label>
      <select class="filter-select" [ngModel]="selectedSectorId()" (ngModelChange)="onSectorChange($event)">
        <option value="">Select Sector...</option>
        @for (s of sectors; track s.id) {
          <option [value]="s.id">{{ s.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Industry</label>
      <select
        class="filter-select"
        [ngModel]="selectedIndustryId()"
        (ngModelChange)="onIndustryChange($event)"
        [disabled]="!selectedSectorId()"
      >
        <option value="">Select Industry...</option>
        @for (i of industries(); track i.id) {
          <option [value]="i.id">{{ i.name }}</option>
        }
      </select>
    </div>

    <div class="filter-actions">
      <button class="btn-teal">↓ Template</button>
      <button class="btn-teal">↓ Template</button>
      <button class="btn-teal" (click)="onAddSkillsClick()">+ Add Skills</button>
      <button class="btn-teal btn-badge" (click)="mappingDialogOpen.set(true)">
        ⬡ Mappings
        <span class="badge">{{ ciCache().length }}</span>
      </button>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="error-banner">
      <span>⚠ {{ errorMessage() }}</span>
      <button class="error-close" (click)="errorMessage.set('')">✕</button>
    </div>
  }

  @if (toastMessage()) {
    <div class="toast-banner">{{ toastMessage() }}</div>
  }

  <div class="workspace">
    <div class="columns-grid">
      <whizard-wrcf-column
        title="Functional Group"
        [items]="fgList()"
        [selectedId]="selectedFG()?.id ?? null"
        (itemSelected)="onFGSelect($event)"
        (addClicked)="openPanel('create', 'FG')"
        (editClicked)="openPanel('edit', 'FG', $event)"
      />

      <whizard-wrcf-column
        title="Primary Work Obj."
        [items]="pwoList()"
        [selectedId]="selectedPWO()?.id ?? null"
        (itemSelected)="onPWOSelect($event)"
        (addClicked)="selectedFG() ? openPanel('create', 'PWO') : null"
        (editClicked)="openPanel('edit', 'PWO', $event)"
      />

      <whizard-wrcf-column
        title="Secondary Work Obj."
        [items]="swoList()"
        [selectedId]="selectedSWO()?.id ?? null"
        (itemSelected)="onSWOSelect($event)"
        (addClicked)="selectedPWO() ? openPanel('create', 'SWO') : null"
        (editClicked)="openPanel('edit', 'SWO', $event)"
      />

      <whizard-wrcf-column
        title="Capabilities"
        [items]="capabilities"
        [selectedId]="selectedCapabilityId()"
        [readonly]="true"
        (itemSelected)="onCapabilitySelect($event)"
      />

      <whizard-wrcf-column
        title="Proficiency Level"
        [items]="proficiencyLevels"
        [selectedId]="selectedProficiencyId()"
        [readonly]="true"
        [checkboxMode]="profCheckboxMode"
        [checkedIds]="checkedProficiencyIds"
        [savedIds]="savedProficiencyIds"
        (itemSelected)="onProficiencySelect($event)"
        (checkboxToggled)="onProficiencyToggle($event)"
      />
    </div>
  </div>

  @if (panel().open) {
    <div class="panel-backdrop" (click)="closePanel()"></div>
    <whizard-wrcf-panel
      [state]="panel()"
      (save)="onPanelSave($event)"
      (delete)="onPanelDelete($event)"
      (close)="closePanel()"
    />
  }

  @if (mappingDialogOpen()) {
    <whizard-manage-ci-mappings
      [cache]="ciCache()"
      [sectors]="sectors"
      [initialSectorId]="selectedSectorId()"
      [initialIndustryId]="selectedIndustryId()"
      [initialFgId]="selectedFG()?.id ?? ''"
      (closed)="mappingDialogOpen.set(false)"
      (pendingRemoved)="onPendingCIRemoved($event)"
      (saved)="onCISave($event)"
      (savedDeleted)="onCISavedDeleted($event)"
    />
  }

  <whizard-nav-drawer [open]="drawerOpen()" (closed)="drawerOpen.set(false)" />
</div>

<div class="column">
  <div class="column-header">
    <span class="column-title">{{ title }}</span>
    @if (!readonly) {
      <button class="add-btn" (click)="addClicked.emit()" title="Add">+</button>
    }
  </div>

  <ul class="item-list">
    @for (item of items; track item.id) {
      <li
        class="item"
        [class.selected]="item.id === selectedId"
        (click)="itemSelected.emit(item)"
      >
        <span class="item-name">
          {{ item.name }}
          @if (item.code) {
            <br /><span class="item-code">({{ item.code }})</span>
          }
        </span>
        @if (!readonly && item.id === selectedId) {
          <button
            class="edit-btn"
            (click)="$event.stopPropagation(); editClicked.emit(item)"
            title="Edit"
          >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        }
        @if (checkboxMode) {
          <button
            class="checkbox-btn"
            [class.checked]="checkedIds.includes(item.id)"
            [class.saved]="savedIds.includes(item.id)"
            (click)="$event.stopPropagation(); checkboxToggled.emit(item)"
            [title]="savedIds.includes(item.id) ? 'Already saved' : 'Toggle capability instance'"
          >
            @if (checkedIds.includes(item.id) || savedIds.includes(item.id)) {
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2,6 5,9 10,3"/>
              </svg>
            }
          </button>
        }
      </li>
    } @empty {
      <li class="item-empty">No items</li>
    }
  </ul>
</div>

<div class="panel">
  <div class="panel-header">
    <span class="panel-title">{{ title }}</span>
    <div class="panel-actions">
      @if (state.mode === 'edit') {
        <button class="action-btn delete-btn" (click)="onDelete()" title="Delete">
          <mat-icon svgIcon="lucideIcons:trash-2" class="size-4" />
        </button>
      }
      <button class="action-btn save-btn" (click)="onSave()" title="Save">
        <mat-icon svgIcon="lucideIcons:check" class="size-4" />
      </button>
      <button class="action-btn close-btn" (click)="close.emit()" title="Close">
        <mat-icon svgIcon="lucideIcons:x" class="size-4" />
      </button>
    </div>
  </div>

  <div class="panel-body">

    <div class="field">
      <label class="field-label">Name <span class="required">*</span></label>
      <input
        class="field-input"
        [class.field-input--readonly]="state.mode === 'edit'"
        type="text"
        placeholder="Enter Name..."
        [(ngModel)]="formName"
        maxlength="50"
        [readonly]="state.mode === 'edit'"
      />
    </div>

    <div class="field">
      <label class="field-label">Description</label>
      <textarea
        class="field-textarea"
        placeholder="Enter Description..."
        [(ngModel)]="formDescription"
        rows="4"
      ></textarea>
    </div>

    @if (state.entityType === 'FG') {
      <div class="attributes-section">
        <span class="attributes-label">Attributes</span>

        <div class="field">
          <label class="field-label">Domain Type</label>
          <select class="field-select" [(ngModel)]="formDomainType">
            @for (opt of domainTypeOptions; track opt) {
              <option [value]="opt">{{ opt }}</option>
            }
          </select>
        </div>
      </div>
    }

    @if (state.entityType === 'PWO') {
      <div class="attributes-section">
        <span class="attributes-label">Attributes</span>

        <div class="field">
          <label class="field-label">Strategic Importance</label>
          <select class="field-select" [(ngModel)]="formStrategicImportance">
            @for (opt of strategicImportanceOptions; track opt) {
              <option [value]="opt">{{ opt }}</option>
            }
          </select>
        </div>

        <div class="field">
          <label class="field-label">Revenue Impact</label>
          <select class="field-select" [(ngModel)]="formRevenueImpact">
            @for (opt of criticalityLevelOptions; track opt.label) {
              <option [ngValue]="opt">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="field">
          <label class="field-label">Downtime Sensitivity</label>
          <select class="field-select" [(ngModel)]="formDowntimeSensitivity">
            @for (opt of criticalityLevelOptions; track opt.label) {
              <option [ngValue]="opt">{{ opt.label }}</option>
            }
          </select>
        </div>
      </div>
    }

    @if (state.entityType === 'SWO') {
      <div class="attributes-section">
        <span class="attributes-label">Attributes</span>

        <div class="field">
          <label class="field-label">Operational Complexity</label>
          <select class="field-select" [(ngModel)]="formOperationalComplexity">
            @for (opt of complexityLevelOptions; track opt.label) {
              <option [ngValue]="opt">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="field">
          <label class="field-label">Asset Criticality</label>
          <select class="field-select" [(ngModel)]="formAssetCriticality">
            @for (opt of criticalityLevelOptions; track opt.label) {
              <option [ngValue]="opt">{{ opt.label }}</option>
            }
          </select>
        </div>

        <div class="field">
          <label class="field-label">Failure Frequency</label>
          <select class="field-select" [(ngModel)]="formFailureFrequency">
            @for (opt of frequencyLevelOptions; track opt.label) {
              <option [ngValue]="opt">{{ opt.label }}</option>
            }
          </select>
        </div>
      </div>
    }
  </div>
</div>

<div class="page">
  @if (noIndustry()) {
  <div class="no-industry-msg">
    Please navigate here from the <a routerLink="/industry-wrcf" class="back-link">Industry WRCF</a> page with an
    Industry selected.
  </div>
  } @else {
  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label">Function Group</label>
      <select class="filter-select" [ngModel]="selectedFGId()" (ngModelChange)="onFGChange($event)">
        <option value="">Select FG...</option>
        @for (fg of fgList(); track fg.id) {
        <option [value]="fg.id">{{ fg.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Primary Work Obj.</label>
      <select class="filter-select" [ngModel]="selectedPWOId()" (ngModelChange)="onPWOChange($event)"
        [disabled]="!selectedFGId()">
        <option value="">Select PWO...</option>
        @for (pwo of pwoList(); track pwo.id) {
        <option [value]="pwo.id">{{ pwo.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Secondary Work Obj.</label>
      <select class="filter-select" [ngModel]="selectedSWOId()" (ngModelChange)="onSWOChange($event)"
        [disabled]="!selectedPWOId()">
        <option value="">Select SWO...</option>
        @for (swo of swoList(); track swo.id) {
        <option [value]="swo.id">{{ swo.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Capability</label>
      <select class="filter-select" [ngModel]="selectedCapabilityId()" (ngModelChange)="onCapabilityChange($event)"
        [disabled]="!selectedSWOId()">
        <option value="">Select Capability...</option>
        @for (c of availableCapabilities; track c.id) {
        <option [value]="c.id">{{ c.name }}</option>
        }
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Proficiency Level</label>
      <select class="filter-select" [ngModel]="selectedProficiencyId()" (ngModelChange)="onProficiencyChange($event)"
        [disabled]="!selectedCapabilityId()">
        <option value="">Select Level...</option>
        @for (p of availableProficiencies; track p.id) {
        <option [value]="p.id">{{ p.name }}</option>
        }
      </select>
    </div>

    <div class="filter-actions">
      <button class="btn-teal" disabled>↓ Template</button>
      <button class="btn-teal" disabled>↓ Template</button>
    </div>
  </div>

  @if (errorMessage()) {
  <div class="error-banner">
    <span>⚠ {{ errorMessage() }}</span>
    <button class="error-close" (click)="errorMessage.set('')">✕</button>
  </div>
  }

  @if (!resolvedCiId()) {
  <div class="no-ci-msg">Select all 5 filters above to manage skills for a Capability Instance.</div>
  }

  <div class="workspace" >
    <div class="columns-grid">
      <whizard-wrcf-column title="Skills" [items]="skillsAsEntities" [selectedId]="selectedSkill()?.id ?? null"
        [readonly]="!resolvedCiId()" (itemSelected)="onSkillSelect($event)" (addClicked)="openSkillPanel('create')"
        (editClicked)="onSkillEditClicked($event)" style="height: 90vh;" whizardScrollbar/>

      <whizard-wrcf-column title="Task" [items]="tasksAsEntities" [selectedId]="selectedTask()?.id ?? null"
        [readonly]="!selectedSkill()" (itemSelected)="onTaskSelect($event)" (addClicked)="openTaskPanel('create')"
        (editClicked)="onTaskEditClicked($event)" style="height: 90vh;" whizardScrollbar />

      <whizard-wrcf-column title="Control Point" [items]="controlPointsAsEntities" [selectedId]="null"
        [readonly]="!selectedTask()" [showEditAlways]="true" (itemSelected)="onControlPointSelect($event)"
        (addClicked)="openControlPointPanel('create')" (editClicked)="onControlPointEditClicked($event)" style="height: 90vh;" whizardScrollbar />
    </div>
  </div>

  @if (panel().open) {
  <div class="panel-backdrop" (click)="closePanel()"></div>
  <whizard-skills-panel #panelRef [state]="panel()" [proficiencyLevels]="allProficienciesPublic"
    [panelError]="panelError()" (save)="onPanelSave($event)" (deleteRequested)="onPanelDeleteRequested()"
    (delete)="onPanelDelete($event)" (close)="closePanel()" />
  }

  }
</div>
